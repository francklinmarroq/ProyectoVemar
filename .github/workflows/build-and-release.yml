name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Publish
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ProyectoVemar.sln

      - name: Build solution
        run: dotnet build ProyectoVemar.sln --configuration Release --no-restore

      - name: Publish WPF app (self-contained)
        run: |
          dotnet publish Vemar.WPF/Vemar.WPF.vbproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ./publish `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Compress artifact
        run: Compress-Archive -Path ./publish/* -DestinationPath VemarApp-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Vemar ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: VemarApp-${{ github.ref_name }}.zip
          generate_release_notes: true
